<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#2a82aa"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="頭痛日記"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="https://e-diary-of-headache.vercel.app/icon-192.png"/>
  <link rel="apple-touch-icon-precomposed" href="https://e-diary-of-headache.vercel.app/icon-192.png"/>
  <title>頭痛日記</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;background:#d2eaf8;overscroll-behavior:none;font-family:'Microsoft JhengHei','PingFang TC','Noto Sans TC',sans-serif}
    #root{min-height:100vh}
    input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:rgba(74,138,176,0.2);outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#4a9abf;cursor:pointer;box-shadow:0 2px 6px rgba(42,130,170,0.4)}
    input,select,textarea{outline:none;font-family:inherit}
    select{-webkit-appearance:none}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:rgba(74,138,176,0.3);border-radius:2px}
    .btn{cursor:pointer;border:none;font-family:inherit}
    /* App */
    .app-root{min-height:100vh;background:linear-gradient(160deg,#e8f5fb,#d2eaf8,#bcdff5);color:#1a3a52;display:flex;flex-direction:column;align-items:center}
    .app-header{width:100%;max-width:520px;padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between}
    .app-main{width:100%;max-width:520px;padding:16px 20px 32px;flex:1}
    .card{background:rgba(255,255,255,0.82);border:1px solid rgba(74,154,191,0.18);border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 2px 14px rgba(74,154,191,0.08)}
    .nav-btn{background:transparent;border:none;color:#7aaac8;font-size:13px;padding:6px 12px;cursor:pointer;border-radius:6px;font-family:inherit}
    .nav-btn.active{background:rgba(74,154,191,0.16);color:#2a82aa}
    .lbl{font-size:11px;letter-spacing:.08em;color:#7aaac8;margin-bottom:6px;display:block;text-transform:uppercase}
    .inp{background:rgba(255,255,255,0.85);border:1px solid rgba(74,138,176,0.3);border-radius:8px;color:#1a3a52;padding:9px 12px;font-size:15px;box-sizing:border-box}
    .pill{display:inline-block;padding:7px 14px;margin:3px;border-radius:20px;border:1px solid rgba(74,138,176,0.25);background:rgba(255,255,255,0.7);color:#5a8aaa;font-size:13px;cursor:pointer}
    .pill.active{border-color:#4a9abf;background:rgba(74,154,191,0.2);color:#1a5a7a}
    .primary-btn{background:linear-gradient(135deg,#4a9abf,#2a82aa);border:none;border-radius:10px;color:#fff;padding:12px 24px;font-size:15px;cursor:pointer;box-shadow:0 3px 12px rgba(42,130,170,0.22);font-family:inherit}
    .back-btn{background:rgba(255,255,255,0.7);border:1px solid rgba(74,138,176,0.25);border-radius:10px;color:#4a7a9a;padding:10px 18px;font-size:14px;cursor:pointer;font-family:inherit}
    .pain-badge{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0}
    .footer-note{padding:12px 20px;font-size:11px;color:#7aaac8;text-align:center}
  </style>
</head>
<body>
<div id="root"></div>
<script>
const SYMPTOMS = ["噁心或嘔吐","怕光","怕吵","搏動性疼痛","單側頭痛","活動使頭痛加劇"];
const MEDICATIONS = ["未服藥","布洛芬","普拿疼/乙醯胺酚","阿斯匹靈","舒馬曲坦","利紮曲坦","萘普生","其他"];
const DIZ_LEVELS = ["輕微","中等","嚴重"];

const todayInfo=()=>{const d=new Date();return{year:d.getFullYear(),month:d.getMonth()+1,day:d.getDate()}};
const daysInMonth=(y,m)=>new Date(y,m,0).getDate();
const monthKey=(y,m)=>`${y}-${String(m).padStart(2,'0')}`;
const painColor=v=>{const n=parseInt(v);if(!n)return'#7aaac8';if(n<=3)return'#2a9a6a';if(n<=6)return'#e09020';return'#d04040'};
const painBg=v=>{const n=parseInt(v);if(!n)return'rgba(74,138,176,0.08)';if(n<=3)return'rgba(42,154,106,0.12)';if(n<=6)return'rgba(224,144,32,0.12)';return'rgba(208,64,64,0.12)'};

// ── 狀態 ──
let state={
  view:'calendar',
  year:todayInfo().year,
  month:todayInfo().month,
  selectedDay:todayInfo().day,
  monthData:{},
  nextVisit:'',
};

const defEntry=()=>({morning:'',afternoon:'',evening:'',symptoms:[],duration:'',medication:'未服藥',medicationEffect:'',stress:'',exercise:'',dizzy:false,dizzyLevel:''});
const getEntry=day=>state.monthData[day]||defEntry();
const mKey=()=>monthKey(state.year,state.month);

function loadMonth(){
  try{
    const d=localStorage.getItem(`hd-data-${mKey()}`);
    state.monthData=d?JSON.parse(d):{};
    const nv=localStorage.getItem(`hd-nv-${mKey()}`);
    state.nextVisit=nv||'';
  }catch{state.monthData={};state.nextVisit='';}
}

function saveDay(day,data){
  state.monthData={...state.monthData,[day]:data};
  try{localStorage.setItem(`hd-data-${mKey()}`,JSON.stringify(state.monthData))}catch{}
}

function saveNextVisit(v){
  state.nextVisit=v;
  try{localStorage.setItem(`hd-nv-${mKey()}`,v)}catch{}
}

// 載入當月資料
loadMonth();

// ── render ──
function render(){
  const root=document.getElementById('root');
  root.innerHTML='';
  renderApp(root);
}

// ── App ──
function renderApp(root){
  const wrap=el('div',{className:'app-root'});

  // Header
  const hdr=el('div',{className:'app-header'});
  const logo=el('div',{style:'display:flex;align-items:center;gap:8px'});
  logo.innerHTML='<span style="font-size:14px;color:#2a82aa;font-weight:bold">🧠 頭痛日記</span>';
  hdr.appendChild(logo);

  const nav=el('div',{style:'display:flex;gap:4px;align-items:center'});
  [['calendar','月曆'],['stats','統計']].forEach(([v,l])=>{
    const b=el('button',{className:'nav-btn btn'+(state.view===v?' active':'')});
    b.textContent=l;b.onclick=()=>{state.view=v;render();};
    nav.appendChild(b);
  });
  const pdfBtn=el('button',{className:'nav-btn btn',style:'background:rgba(42,150,100,0.1);color:#2a8a5a'});
  pdfBtn.textContent='🖨️';pdfBtn.onclick=exportPDF;
  nav.appendChild(pdfBtn);
  hdr.appendChild(nav);
  wrap.appendChild(hdr);

  const main=el('div',{className:'app-main'});
  if(state.view==='calendar')renderCalendar(main);
  else if(state.view==='entry')renderEntry(main);
  else if(state.view==='stats')renderStats(main);
  wrap.appendChild(main);

  const footer=el('div',{className:'footer-note'});
  footer.innerHTML='內容根據台灣頭痛學會之建議制定 · 僅供個人記錄，非醫療建議<br>© 版權所有 廖晏輝醫師';
  wrap.appendChild(footer);
  root.appendChild(wrap);
}

// ── 月曆 ──
function renderCalendar(main){
  const t=todayInfo();
  const totalDays=daysInMonth(state.year,state.month);
  const firstDay=new Date(state.year,state.month-1,1).getDay();

  // 計算統計
  const stats=calcStats();

  // 月份卡
  const calCard=el('div',{className:'card'});

  // 月份導覽
  const monthNav=el('div',{style:'display:flex;align-items:center;justify-content:space-between;margin-bottom:12px'});
  const prevBtn=el('button',{className:'back-btn btn',style:'padding:6px 14px;font-size:16px'});prevBtn.textContent='‹';
  prevBtn.onclick=()=>{if(state.month===1){state.year--;state.month=12;}else state.month--;state.selectedDay=1;loadMonth();render();};
  monthNav.appendChild(prevBtn);

  const monthTitle=el('div',{style:'text-align:center'});
  monthTitle.innerHTML=`<div style="font-size:18px;font-weight:bold;color:#2a82aa">${state.year} 年 ${state.month} 月</div>`;
  const nvRow=el('div',{style:'font-size:11px;color:#7aaac8;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:6px'});
  nvRow.appendChild(document.createTextNode('下次回診：'));
  const nvInp=el('input',{type:'date',className:'inp',style:'display:inline;width:auto;padding:2px 8px;font-size:12px'});
  nvInp.value=state.nextVisit;
  nvInp.onchange=e=>{saveNextVisit(e.target.value);};
  nvRow.appendChild(nvInp);
  monthTitle.appendChild(nvRow);
  monthNav.appendChild(monthTitle);

  const nextBtn=el('button',{className:'back-btn btn',style:'padding:6px 14px;font-size:16px'});nextBtn.textContent='›';
  nextBtn.onclick=()=>{if(state.month===12){state.year++;state.month=1;}else state.month++;state.selectedDay=1;loadMonth();render();};
  monthNav.appendChild(nextBtn);
  calCard.appendChild(monthNav);

  // 星期列
  const weekRow=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px'});
  ['日','一','二','三','四','五','六'].forEach(d=>{
    const c=el('div',{style:'text-align:center;font-size:11px;color:#7aaac8;padding:4px 0'});c.textContent=d;weekRow.appendChild(c);
  });
  calCard.appendChild(weekRow);

  // 日期格
  const grid=el('div',{style:'display:grid;grid-template-columns:repeat(7,1fr);gap:3px'});
  for(let i=0;i<firstDay;i++) grid.appendChild(el('div'));
  for(let day=1;day<=totalDays;day++){
    const e=state.monthData[day]||{};
    const mp=Math.max(parseInt(e.morning)||0,parseInt(e.afternoon)||0,parseInt(e.evening)||0);
    const has=e.morning||e.afternoon||e.evening||(e.symptoms&&e.symptoms.length>0);
    const isToday=day===t.day&&state.month===t.month&&state.year===t.year;
    const isSel=day===state.selectedDay;
    let bg=has?(mp<=3?'rgba(42,154,106,0.15)':mp<=6?'rgba(224,144,32,0.15)':'rgba(208,64,64,0.15)'):'rgba(255,255,255,0.6)';
    let border=isSel?'#2a82aa':has?(mp<=3?'#2a9a6a':mp<=6?'#e09020':'#d04040'):'rgba(74,138,176,0.2)';
    const cell=el('div',{style:`text-align:center;padding:5px 2px;border-radius:10px;background:${bg};border:2px solid ${border};cursor:pointer`});
    const dayNum=el('div',{style:`font-size:13px;font-weight:${isToday?'bold':'normal'};color:${isSel?'#2a82aa':'#1a3a52'}`});
    dayNum.textContent=day;cell.appendChild(dayNum);
    if(has){const pn=el('div',{style:`font-size:10px;color:${mp<=3?'#2a9a6a':mp<=6?'#e09020':'#d04040'};font-weight:bold`});pn.textContent=mp||'✓';cell.appendChild(pn);}
    if(e.dizzy){const dz=el('div',{style:'font-size:9px;color:#7a5aaa'});dz.textContent='暈';cell.appendChild(dz);}
    cell.onclick=()=>{state.selectedDay=day;state.view='entry';render();};
    grid.appendChild(cell);
  }
  calCard.appendChild(grid);

  // 圖例
  const legend=el('div',{style:'display:flex;gap:10px;margin-top:10px;justify-content:center;flex-wrap:wrap'});
  [['輕微 1-3','#2a9a6a'],['中等 4-6','#e09020'],['嚴重 7-10','#d04040'],['頭暈','#7a5aaa']].forEach(([l,c])=>{
    const li=el('div',{style:'display:flex;align-items:center;gap:4px;font-size:11px;color:#4a7a9a'});
    const dot=el('div',{style:`width:10px;height:10px;border-radius:2px;background:${c};opacity:0.7`});
    li.appendChild(dot);li.appendChild(document.createTextNode(l));legend.appendChild(li);
  });
  calCard.appendChild(legend);
  main.appendChild(calCard);

  // 統計小結
  const statRow=el('div',{style:'display:flex;gap:8px;margin-bottom:14px'});
  [{val:stats.headacheDays,label:'頭痛天數',color:'#2a82aa'},{val:stats.moderateDays,label:'中度以上天數',color:'#e09020'},{val:stats.medDays,label:'用藥天數',color:'#7a5aaa'},{val:stats.dizzyDays,label:'頭暈天數',color:'#5a7aaa'}].forEach(({val,label,color})=>{
    const box=el('div',{style:'flex:1;background:rgba(255,255,255,0.82);border:1px solid rgba(74,154,191,0.18);border-radius:12px;padding:12px 6px;text-align:center'});
    const v=el('div',{style:`font-size:22px;font-weight:bold;color:${color}`});v.textContent=val;
    const l=el('div',{style:'font-size:9px;color:#7aaac8;margin-top:3px'});l.textContent=label;
    box.appendChild(v);box.appendChild(l);statRow.appendChild(box);
  });
  main.appendChild(statRow);

  const addBtn=el('button',{className:'primary-btn btn',style:'width:100%'});
  addBtn.textContent='＋ 填寫今日紀錄';
  addBtn.onclick=()=>{state.selectedDay=t.day;state.view='entry';render();};
  main.appendChild(addBtn);
}

// ── 單日填寫 ──
function renderEntry(main){
  const e=getEntry(state.selectedDay);
  const totalDays=daysInMonth(state.year,state.month);

  const hdr=el('div',{style:'display:flex;align-items:center;gap:12px;margin-bottom:16px'});
  const back=el('button',{className:'back-btn btn'});back.textContent='← 返回';
  back.onclick=()=>{state.view='calendar';render();};
  hdr.appendChild(back);
  const info=el('div');
  info.innerHTML=`<div style="font-size:17px;font-weight:bold;color:#2a82aa">${state.year} 年 ${state.month} 月 ${state.selectedDay} 日</div><div style="font-size:11px;color:#7aaac8">請填寫當日頭痛狀況</div>`;
  hdr.appendChild(info);
  main.appendChild(hdr);

  // 疼痛
  const painCard=el('div',{className:'card'});
  const painHdr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px'});
  painHdr.innerHTML='<span style="font-size:15px;font-weight:bold;color:#1a3a52">是否有頭痛</span><span style="font-size:11px;color:#7aaac8">0無痛 ～ 10最嚴重</span>';
  painCard.appendChild(painHdr);
  [['morning','早上'],['afternoon','下午'],['evening','晚上']].forEach(([field,label])=>{
    const row=el('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:10px'});
    const lbl=el('div',{style:'width:36px;font-size:13px;color:#4a7a9a;flex-shrink:0'});lbl.textContent=label;
    const slider=el('input',{type:'range',min:0,max:10,value:parseInt(e[field])||0,style:`flex:1;accent-color:${painColor(e[field])}`});
    const val=parseInt(e[field])||0;
    const badge=el('div',{style:`width:28px;height:28px;border-radius:50%;background:${painBg(e[field])};border:2px solid ${val?painColor(e[field]):'rgba(74,138,176,0.2)'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;color:${painColor(e[field])};flex-shrink:0`});
    badge.textContent=val;
    slider.oninput=ev=>{
      const updated={...getEntry(state.selectedDay),[field]:ev.target.value};
      saveDay(state.selectedDay,updated);
      badge.textContent=ev.target.value;
      badge.style.color=painColor(ev.target.value);
      badge.style.borderColor=parseInt(ev.target.value)?painColor(ev.target.value):'rgba(74,138,176,0.2)';
      badge.style.background=painBg(ev.target.value);
      slider.style.accentColor=painColor(ev.target.value);
    };
    row.appendChild(lbl);row.appendChild(slider);row.appendChild(badge);
    painCard.appendChild(row);
  });
  main.appendChild(painCard);

  // 伴隨症狀
  const symCard=el('div',{className:'card'});
  const symTitle=el('div',{style:'font-size:15px;font-weight:bold;color:#1a3a52;margin-bottom:10px'});symTitle.textContent='伴隨症狀';
  symCard.appendChild(symTitle);
  const symWrap=el('div');
  SYMPTOMS.forEach(s=>{
    const active=(e.symptoms||[]).includes(s);
    const p=el('button',{className:'pill btn'+(active?' active':'')});
    p.textContent=s;
    p.onclick=()=>{
      const cur=getEntry(state.selectedDay);
      const list=cur.symptoms||[];
      const updated={...cur,symptoms:list.includes(s)?list.filter(x=>x!==s):[...list,s]};
      saveDay(state.selectedDay,updated);
      p.classList.toggle('active');
    };
    symWrap.appendChild(p);
  });
  symCard.appendChild(symWrap);
  main.appendChild(symCard);

  // 持續時間
  const durCard=el('div',{className:'card'});
  durCard.innerHTML='<div style="font-size:15px;font-weight:bold;color:#1a3a52;margin-bottom:10px">頭痛持續時間（小時）</div>';
  const durInp=el('input',{type:'number',className:'inp',min:0,max:72,step:0.5,placeholder:'例：4',style:'width:100%'});
  durInp.value=e.duration||'';
  durInp.oninput=ev=>{saveDay(state.selectedDay,{...getEntry(state.selectedDay),duration:ev.target.value});};
  durCard.appendChild(durInp);
  main.appendChild(durCard);

  // 其他
  const otherCard=el('div',{className:'card'});
  otherCard.innerHTML='<div style="font-size:15px;font-weight:bold;color:#1a3a52;margin-bottom:14px">其他狀況記錄</div>';

  // 藥物
  const medLbl=el('label',{className:'lbl'});medLbl.textContent='有服用止痛藥';
  otherCard.appendChild(medLbl);
  const medWrap=el('div',{style:'margin-bottom:14px'});
  MEDICATIONS.forEach(m=>{
    const p=el('button',{className:'pill btn'+(e.medication===m?' active':'')});
    p.textContent=m;
    p.onclick=()=>{
      const updated={...getEntry(state.selectedDay),medication:m};
      saveDay(state.selectedDay,updated);
      medWrap.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
      render(); // re-render to show effect buttons
    };
    medWrap.appendChild(p);
  });
  otherCard.appendChild(medWrap);

  // 藥效
  if(e.medication&&e.medication!=='未服藥'){
    const effLbl=el('label',{className:'lbl'});effLbl.textContent='止痛藥效果';
    otherCard.appendChild(effLbl);
    const effRow=el('div',{style:'display:flex;gap:8px;margin-bottom:14px'});
    [['有效','#2a9a6a'],['部分有效','#e09020'],['無效','#d04040']].forEach(([val,col])=>{
      const active=e.medicationEffect===val;
      const b=el('button',{className:'btn',style:`flex:1;padding:9px 6px;border-radius:10px;border:1px solid ${active?col:'rgba(74,138,176,0.25)'};background:${active?col+'22':'rgba(255,255,255,0.7)'};color:${active?col:'#5a8aaa'};font-size:13px;cursor:pointer;font-family:inherit`});
      b.textContent=val;
      b.onclick=()=>{saveDay(state.selectedDay,{...getEntry(state.selectedDay),medicationEffect:val});render();};
      effRow.appendChild(b);
    });
    otherCard.appendChild(effRow);
  }

  // 壓力
  const strLbl=el('label',{className:'lbl'});strLbl.textContent='壓力指數（1–10）';
  otherCard.appendChild(strLbl);
  const strRow=el('div',{style:'display:flex;align-items:center;gap:10px;margin-bottom:14px'});
  const strSlider=el('input',{type:'range',min:0,max:10,value:parseInt(e.stress)||0,style:'flex:1;accent-color:#4a9abf'});
  const strBadge=el('div',{style:'width:32px;height:32px;border-radius:50%;background:rgba(74,154,191,0.12);border:2px solid #4a9abf;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:#2a82aa'});
  strBadge.textContent=parseInt(e.stress)||0;
  strSlider.oninput=ev=>{saveDay(state.selectedDay,{...getEntry(state.selectedDay),stress:ev.target.value});strBadge.textContent=ev.target.value;};
  strRow.appendChild(strSlider);strRow.appendChild(strBadge);
  otherCard.appendChild(strRow);

  // 運動
  const exLbl=el('label',{className:'lbl'});exLbl.textContent='運動項目';
  otherCard.appendChild(exLbl);
  const exInp=el('input',{type:'text',className:'inp',placeholder:'例：慢跑30分、瑜伽、無',style:'width:100%'});
  exInp.value=e.exercise||'';
  exInp.oninput=ev=>{saveDay(state.selectedDay,{...getEntry(state.selectedDay),exercise:ev.target.value});};
  otherCard.appendChild(exInp);
  main.appendChild(otherCard);

  // ── 頭暈欄位 ──
  const dizCard=el('div',{className:'card',style:`border:1px solid ${e.dizzy?'rgba(122,90,170,0.4)':'rgba(74,154,191,0.18)'};background:${e.dizzy?'rgba(122,90,170,0.06)':'rgba(255,255,255,0.82)'}`});
  const dizTitle=el('div',{style:'font-size:15px;font-weight:bold;color:#1a3a52;margin-bottom:14px'});dizTitle.textContent='是否會頭暈';
  dizCard.appendChild(dizTitle);

  const ynRow=el('div',{style:'display:flex;gap:12px;margin-bottom:'+(e.dizzy?'14px':'0')});
  [['是',true],['否',false]].forEach(([label,val])=>{
    const active=e.dizzy===val;
    const col=val?'#7a5aaa':'#2a9a6a';
    const b=el('button',{className:'btn',style:`flex:1;padding:12px;border-radius:12px;border:2px solid ${active?col:'rgba(74,138,176,0.25)'};background:${active?(val?'rgba(122,90,170,0.12)':'rgba(42,154,106,0.1)'):'rgba(255,255,255,0.7)'};color:${active?col:'#5a8aaa'};font-size:16px;font-weight:bold;cursor:pointer;font-family:inherit`});
    b.textContent=label;
    b.onclick=()=>{
      const updated={...getEntry(state.selectedDay),dizzy:val};
      if(!val)updated.dizzyLevel='';
      saveDay(state.selectedDay,updated);render();
    };
    ynRow.appendChild(b);
  });
  dizCard.appendChild(ynRow);

  if(e.dizzy){
    const levLbl=el('label',{className:'lbl',style:'color:#9a7acc'});levLbl.textContent='嚴重程度';
    dizCard.appendChild(levLbl);
    const levRow=el('div',{style:'display:flex;gap:8px'});
    const cols=['#2a9a6a','#e09020','#d04040'];
    DIZ_LEVELS.forEach((lv,i)=>{
      const active=e.dizzyLevel===lv;
      const col=cols[i];
      const b=el('button',{className:'btn',style:`flex:1;padding:10px 6px;border-radius:10px;border:2px solid ${active?col:'rgba(74,138,176,0.25)'};background:${active?col+'22':'rgba(255,255,255,0.7)'};color:${active?col:'#5a8aaa'};font-size:14px;font-weight:${active?'bold':'normal'};cursor:pointer;font-family:inherit`});
      b.textContent=lv;
      b.onclick=()=>{saveDay(state.selectedDay,{...getEntry(state.selectedDay),dizzyLevel:lv});render();};
      levRow.appendChild(b);
    });
    dizCard.appendChild(levRow);
  }
  main.appendChild(dizCard);

  // 前後天
  const navRow=el('div',{style:'display:flex;gap:10px'});
  const prevDay=el('button',{className:'back-btn btn',style:'flex:1'});
  prevDay.textContent='‹ 前一天';prevDay.disabled=state.selectedDay<=1;
  prevDay.onclick=()=>{state.selectedDay--;render();};
  const nextDay=el('button',{className:'primary-btn btn',style:'flex:1'});
  nextDay.textContent='後一天 ›';nextDay.disabled=state.selectedDay>=totalDays;
  nextDay.onclick=()=>{state.selectedDay++;render();};
  navRow.appendChild(prevDay);navRow.appendChild(nextDay);
  main.appendChild(navRow);
}

// ── 統計 ──
function renderStats(main){
  const stats=calcStats();

  const hdr=el('div',{style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:16px'});
  const title=el('div',{style:'font-size:18px;font-weight:bold;color:#2a82aa'});
  title.textContent=`${state.year} 年 ${state.month} 月 統計`;
  const pdfBtn=el('button',{className:'btn',style:'background:linear-gradient(135deg,#3aaa7a,#2a8a5a);border:none;border-radius:8px;color:#fff;padding:9px 14px;font-size:13px;cursor:pointer;font-family:inherit'});
  pdfBtn.textContent='🖨️ 匯出PDF';pdfBtn.onclick=exportPDF;
  hdr.appendChild(title);hdr.appendChild(pdfBtn);
  main.appendChild(hdr);

  // 數字
  const statRow=el('div',{style:'display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap'});
  [{val:stats.headacheDays,label:'頭痛天數',color:'#2a82aa'},{val:stats.moderateDays,label:'中度以上天數',color:'#e09020'},{val:stats.medDays,label:'用藥天數',color:'#7a5aaa'},{val:stats.dizzyDays,label:'頭暈天數',color:'#5a7aaa'}].forEach(({val,label,color})=>{
    const box=el('div',{style:'flex:1 1 70px;background:rgba(255,255,255,0.82);border:1px solid rgba(74,154,191,0.18);border-radius:12px;padding:14px 8px;text-align:center'});
    const v=el('div',{style:`font-size:24px;font-weight:bold;color:${color}`});v.textContent=val;
    const l=el('div',{style:'font-size:10px;color:#7aaac8;margin-top:3px'});l.textContent=label;
    box.appendChild(v);box.appendChild(l);statRow.appendChild(box);
  });
  main.appendChild(statRow);

  // 症狀
  if(stats.topSymptoms.length>0){
    const symCard=el('div',{className:'card'});
    const st=el('div',{style:'font-size:14px;font-weight:bold;color:#1a3a52;margin-bottom:12px'});st.textContent='常見伴隨症狀';
    symCard.appendChild(st);
    const max=stats.topSymptoms[0][1]||1;
    stats.topSymptoms.forEach(([s,c])=>{
      const row=el('div',{style:'margin-bottom:10px'});
      const top=el('div',{style:'display:flex;justify-content:space-between;margin-bottom:4px'});
      const sl=el('span',{style:'font-size:13px;color:#1a3a52'});sl.textContent=s;
      const sc=el('span',{style:'font-size:12px;color:#7aaac8'});sc.textContent=c+' 次';
      top.appendChild(sl);top.appendChild(sc);
      const bar=el('div',{style:'height:4px;background:rgba(74,138,176,0.12);border-radius:2px'});
      const fill=el('div',{style:`height:100%;width:${(c/max)*100}%;background:#4a9abf;border-radius:2px`});
      bar.appendChild(fill);row.appendChild(top);row.appendChild(bar);symCard.appendChild(row);
    });
    main.appendChild(symCard);
  }

  // 每日明細
  const entries=Object.entries(state.monthData).filter(([,e])=>e.morning||e.afternoon||e.evening).sort((a,b)=>parseInt(a[0])-parseInt(b[0]));
  if(entries.length>0){
    const detCard=el('div',{className:'card'});
    const dt=el('div',{style:'font-size:14px;font-weight:bold;color:#1a3a52;margin-bottom:12px'});dt.textContent='每日紀錄';
    detCard.appendChild(dt);
    entries.forEach(([day,e])=>{
      const mp=Math.max(parseInt(e.morning)||0,parseInt(e.afternoon)||0,parseInt(e.evening)||0);
      const col=painColor(mp);
      const row=el('div',{style:'display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid rgba(74,138,176,0.08);cursor:pointer'});
      const badge=el('div',{style:`width:36px;height:36px;border-radius:50%;background:${col}20;border:2px solid ${col};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:bold;color:${col};flex-shrink:0`});
      badge.textContent=day;
      const info=el('div',{style:'flex:1'});
      const l1=el('div',{style:'font-size:13px;color:#1a3a52'});
      l1.textContent=`早${e.morning||0} · 午${e.afternoon||0} · 晚${e.evening||0}${e.duration?' · '+e.duration+'小時':''}${e.dizzy?' · 頭暈'+(e.dizzyLevel?'('+e.dizzyLevel+')':''):''}`;
      const l2=el('div',{style:'font-size:11px;color:#7aaac8;margin-top:2px'});
      l2.textContent=(e.symptoms||[]).slice(0,3).join('、')||'無症狀';
      info.appendChild(l1);info.appendChild(l2);
      const arr=el('span',{style:'color:#7aaac8'});arr.textContent='›';
      row.appendChild(badge);row.appendChild(info);row.appendChild(arr);
      row.onclick=()=>{state.selectedDay=parseInt(day);state.view='entry';render();};
      detCard.appendChild(row);
    });
    main.appendChild(detCard);
  }

  if(stats.headacheDays===0){
    const empty=el('div',{className:'card',style:'text-align:center;padding:32px'});
    empty.innerHTML='<p style="color:#7aaac8;margin:0">本月尚無頭痛紀錄。</p>';
    main.appendChild(empty);
  }
}

// ── 統計計算 ──
function calcStats(){
  const headacheDays=Object.entries(state.monthData).filter(([,e])=>parseInt(e.morning)>0||parseInt(e.afternoon)>0||parseInt(e.evening)>0).length;
  // 中度以上：任一時段疼痛 >= 4
  const moderateDays=Object.entries(state.monthData).filter(([,e])=>parseInt(e.morning)>=4||parseInt(e.afternoon)>=4||parseInt(e.evening)>=4).length;
  const medDays=Object.values(state.monthData).filter(e=>e.medication&&e.medication!=='未服藥').length;
  const dizzyDays=Object.values(state.monthData).filter(e=>e.dizzy).length;
  const allPains=Object.values(state.monthData).flatMap(e=>[parseInt(e.morning)||0,parseInt(e.afternoon)||0,parseInt(e.evening)||0].filter(v=>v>0));
  const avgPain=allPains.length?(allPains.reduce((a,b)=>a+b,0)/allPains.length).toFixed(1):'–';
  const symptomCount={};
  Object.values(state.monthData).forEach(e=>(e.symptoms||[]).forEach(s=>symptomCount[s]=(symptomCount[s]||0)+1));
  const topSymptoms=Object.entries(symptomCount).sort((a,b)=>b[1]-a[1]);
  return{headacheDays,moderateDays,medDays,dizzyDays,allPains,avgPain,topSymptoms};
}

// ── PDF ──
function exportPDF(){
  const totalDays=daysInMonth(state.year,state.month);
  const stats=calcStats();
  const rows=Array.from({length:totalDays},(_,i)=>i+1).map(day=>({day,...(state.monthData[day]||defEntry())}));
  const pc=v=>{const n=parseInt(v);if(!n)return'p0';if(n<=3)return'pl';if(n<=6)return'pm';return'ph'};
  const html=`<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"/>
<title>頭痛日記 ${state.year}年${state.month}月</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Microsoft JhengHei','PingFang TC',sans-serif;font-size:9px;color:#1a3a52}
@page{size:A4 landscape;margin:6mm 6mm}
@media print{
  html,body{width:297mm;height:210mm}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  table{page-break-inside:avoid}
}
.hdr{display:flex;justify-content:space-between;margin-bottom:5px;padding-bottom:4px;border-bottom:2px solid #2a82aa}
.title{font-size:14px;font-weight:bold;color:#2a82aa}.sub{font-size:8px;color:#7aaac8;margin-top:1px}
.meta{text-align:right;font-size:9px;color:#4a7a9a;line-height:1.6}
.sum{display:flex;gap:6px;margin-bottom:5px}
.stat{background:#e8f5fb;border:1px solid #b0d8f0;border-radius:4px;padding:3px 8px;text-align:center;flex:1}
.sv{font-size:13px;font-weight:bold;color:#2a82aa}.sl{font-size:7px;color:#7aaac8}
table{width:100%;border-collapse:collapse;table-layout:fixed}

tr:nth-child(even) td{background:#f0f8fd}
.dc{font-weight:bold;color:#2a82aa;background:#e8f5fb!important;width:20px}
.p0{color:#aaa}.pl{color:#2a9a6a;font-weight:bold}.pm{color:#e09020;font-weight:bold}.ph{color:#d04040;font-weight:bold}
.ck{color:#2a82aa}.ft{margin-top:4px;font-size:7px;color:#7aaac8;text-align:center;border-top:1px solid #c0d8e8;padding-top:4px}
</style></head><body>
<div class="hdr">
<div><div class="title">🧠 頭痛日記</div><div class="sub">內容根據台灣頭痛學會之建議制定</div></div>
<div class="meta"><b>${state.year}年${state.month}月</b>${state.nextVisit?'<br>下次回診：'+state.nextVisit:''}<br>列印：${new Date().toLocaleDateString('zh-TW')}</div>
</div>
<div class="sum">
<div class="stat"><div class="sv">${stats.headacheDays}</div><div class="sl">頭痛天數</div></div>
<div class="stat"><div class="sv">${stats.moderateDays}</div><div class="sl">中度以上天數</div></div>
<div class="stat"><div class="sv">${stats.avgPain}</div><div class="sl">平均疼痛</div></div>
<div class="stat"><div class="sv">${stats.medDays}</div><div class="sl">用藥天數</div></div>
<div class="stat"><div class="sv">${stats.dizzyDays}</div><div class="sl">頭暈天數</div></div>
<div class="stat"><div class="sv">${stats.allPains.length?Math.max(...stats.allPains):'–'}</div><div class="sl">最高疼痛</div></div>
</div>
<table><thead><tr><th>日</th><th>早上</th><th>下午</th><th>晚上</th><th>噁心嘔吐</th><th>怕光</th><th>怕吵</th><th>搏動性</th><th>單側</th><th>活動加劇</th><th>持續(時)</th><th>止痛藥</th><th>藥效</th><th>頭暈</th><th>壓力</th><th>運動項目</th></tr></thead>
<tbody>${rows.map(({day,morning,afternoon,evening,symptoms,duration,medication,medicationEffect,dizzy,dizzyLevel,stress,exercise})=>{
const sym=symptoms||[];
return`<tr><td class="dc">${day}</td><td class="${pc(morning)}">${morning||'0'}</td><td class="${pc(afternoon)}">${afternoon||'0'}</td><td class="${pc(evening)}">${evening||'0'}</td><td>${sym.includes('噁心或嘔吐')?'<span class="ck">✓</span>':''}</td><td>${sym.includes('怕光')?'<span class="ck">✓</span>':''}</td><td>${sym.includes('怕吵')?'<span class="ck">✓</span>':''}</td><td>${sym.includes('搏動性疼痛')?'<span class="ck">✓</span>':''}</td><td>${sym.includes('單側頭痛')?'<span class="ck">✓</span>':''}</td><td>${sym.includes('活動使頭痛加劇')?'<span class="ck">✓</span>':''}</td><td>${duration||''}</td><td style="font-size:9px">${medication!=='未服藥'?medication:''}</td><td>${medicationEffect||''}</td><td>${dizzy?(dizzyLevel||'是'):''}</td><td>${stress||''}</td><td style="font-size:9px;text-align:left;padding-left:4px">${exercise||''}</td></tr>`;
}).join('')}</tbody></table>
<div class="ft">僅供個人記錄使用，不可取代求醫之需要，亦不能作為自我診斷或選擇治療的依據。© 版權所有 廖晏輝醫師</div>
</body></html>`;
  // 用隱藏 iframe 列印，不開新視窗
  const iframe=document.createElement('iframe');
  iframe.style.cssText='position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none';
  document.body.appendChild(iframe);
  iframe.contentDocument.open();
  iframe.contentDocument.write(html);
  iframe.contentDocument.close();
  // 強制橫式：注入 landscape meta + style
  const meta=iframe.contentDocument.createElement('meta');
  meta.name='viewport';
  meta.content='width=1200';
  iframe.contentDocument.head.appendChild(meta);
  iframe.contentWindow.onafterprint=()=>{
    try{document.body.removeChild(iframe);}catch{}
  };
  setTimeout(()=>{
    try{iframe.contentWindow.print();}catch(e){console.log(e);}
  },800);
}

// ── 工具 ──
function el(tag,props={}){
  const e=document.createElement(tag);
  Object.entries(props).forEach(([k,v])=>{
    if(k==='className')e.className=v;
    else if(k==='style'&&typeof v==='string')e.style.cssText=v;
    else if(k in e)e[k]=v;
    else e.setAttribute(k,v);
  });
  return e;
}

// 啟動
render();

if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});
}
</script>
